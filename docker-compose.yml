services:
  app_auth:
    build:
      context: .
      target: dev
    container_name: app_auth
    volumes:
      - .env:/app/.env
      - ./private_key.pem:/app/private_key.pem
      - ./public_key.pem:/app/public_key.pem
    depends_on:
      mariadb_auth:
        condition: service_healthy
    restart: on-failure
    networks:
      - default
      - traefik_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app_auth.rule=Host(`auth.localhost`)"
      - "traefik.http.services.app_auth.loadbalancer.server.port=8081"

  mariadb_auth:
    image: mariadb:11
    container_name: mariadb_auth
    environment:
      MARIADB_RANDOM_ROOT_PASSWORD: 1
      MARIADB_USER: gouser
      MARIADB_PASSWORD: password
      MARIADB_DATABASE: go_auth
    ports:
      - "3306:3306"
    volumes:
      - mariadb_auth_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin_auth:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin_auth
    environment:
      PMA_HOST: mariadb_auth
      PMA_USER: gouser
      PMA_PASSWORD: password
    depends_on:
      - mariadb_auth
    networks:
      - default
      - traefik_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pma_auth.rule=Host(`pma-auth.localhost`)"
      - "traefik.http.services.pma_auth.loadbalancer.server.port=80"

volumes:
  mariadb_auth_data:

networks:
  traefik_network:
    external: true
